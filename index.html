<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>VIII-A ○ SMPN 1 PATIANROWO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     HOME PAGE
═════════════════════════════════════════════════════════════ -->
<div id="home" class="page active">

  <!-- HERO HEADER -->
  <div class="hero-header">
    <!-- Orbs -->
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>

    <!-- Bintang -->
    <div class="star" style="width:2px;height:2px;top:12%;left:15%;--d:2.5s;--delay:-0.5s"></div>
    <div class="star" style="width:1px;height:1px;top:20%;left:70%;--d:3.2s;--delay:-1s"></div>
    <div class="star" style="width:2px;height:2px;top:35%;left:85%;--d:2s;--delay:-0.3s"></div>
    <div class="star" style="width:1px;height:1px;top:55%;left:10%;--d:4s;--delay:-2s"></div>
    <div class="star" style="width:2px;height:2px;top:8%;left:50%;--d:2.8s;--delay:-1.5s"></div>
    <div class="star" style="width:1px;height:1px;top:70%;left:30%;--d:3.5s;--delay:-0.8s"></div>
    <div class="star" style="width:3px;height:3px;top:25%;left:40%;--d:2.2s;--delay:-2.2s"></div>
    <div class="star" style="width:1px;height:1px;top:80%;left:75%;--d:3s;--delay:-1.2s"></div>
    <div class="star" style="width:2px;height:2px;top:45%;left:55%;--d:2.6s;--delay:-0.6s"></div>
    <div class="star" style="width:1px;height:1px;top:15%;left:90%;--d:4.2s;--delay:-3s"></div>
    <div class="star" style="width:2px;height:2px;top:60%;left:20%;--d:2.4s;--delay:-1.8s"></div>
    <div class="star" style="width:1px;height:1px;top:5%;left:60%;--d:3.8s;--delay:-0.4s"></div>

    <!-- Meteor -->
    <div class="meteor" style="--top:8%;  --left:95%; --w:140px; --dur:2.2s; --delay:0s"></div>
    <div class="meteor" style="--top:18%; --left:80%; --w:100px; --dur:1.8s; --delay:1.4s"></div>
    <div class="meteor" style="--top:5%;  --left:70%; --w:160px; --dur:2.6s; --delay:3s"></div>
    <div class="meteor" style="--top:30%; --left:90%; --w:90px;  --dur:1.6s; --delay:0.8s"></div>
    <div class="meteor" style="--top:12%; --left:60%; --w:120px; --dur:2s;   --delay:4.5s"></div>
    <div class="meteor" style="--top:2%;  --left:100%;--w:110px; --dur:2.4s; --delay:2.2s"></div>

    <div class="class-badge">✦ Angkatan 2025/2026 ✦</div>
    <h1 class="class-title">VII-A</h1>
    <p class="school-name">SMPN 1 PATIANROWO</p>
  </div>

  <!-- TEACHER SECTION -->
  <div id="teacher-section"></div>

  <!-- BANNER -->
  <div class="banner-wrap">
    <!--
      Ganti src di bawah ini dengan link foto banner kelas kamu!
      Contoh: src="https://lh3.googleusercontent.com/d/1iNCu9rv7B5yXn0tYSHwMMOkEfuTMHW5L"
    -->
    <img class="banner-img"
         id="banner-img"
         src="https://lh3.googleusercontent.com/d/1iNCu9rv7B5yXn0tYSHwMMOkEfuTMHW5L"
         alt="Foto Kelas XII IPA 2"
         onerror="this.style.display='none'; document.getElementById('banner-fallback').style.display='flex'">
    <div id="banner-fallback" style="display:none; width:100%; height:100%; background:linear-gradient(135deg,#1a0533,#0d1b4b); align-items:center; justify-content:center; flex-direction:column; gap:8px;">
      <span style="font-size:48px">📸</span>
      <span style="color:#8892b0; font-size:13px">Ganti link foto banner di index.html</span>
    </div>
    <div class="banner-overlay">
      <h2>WELCOME</h2>
      <span>Everyone</span>
    </div>
  </div>

  <!-- MENU GRID -->
  <div class="section-label">Menu Utama</div>
  <div class="menu-grid">

    <!-- Instagram -->
    <a class="menu-btn"
       href="https://www.instagram.com/delapana_spensaro41?igsh=MTg2ejY0ZXRpbjJiaQ=="
       target="_blank"
       rel="noopener">
      <div class="menu-icon ig">
        <svg width="22" height="22" fill="white" viewBox="0 0 24 24">
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 1.17.054 1.97.24 2.43.403a4.92 4.92 0 0 1 1.772 1.153 4.902 4.902 0 0 1 1.153 1.772c.163.46.35 1.26.403 2.43.058 1.266.07 1.646.07 4.85s-.012 3.584-.07 4.85c-.054 1.17-.24 1.97-.403 2.43a4.902 4.902 0 0 1-1.153 1.772 4.92 4.92 0 0 1-1.772 1.153c-.46.163-1.26.35-2.43.403-1.266.058-1.646.07-4.85.07s-3.584-.012-4.85-.07c-1.17-.054-1.97-.24-2.43-.403a4.902 4.902 0 0 1-1.772-1.153A4.92 4.92 0 0 1 2.566 19.44c-.163-.46-.35-1.26-.403-2.43C2.105 15.744 2.093 15.364 2.093 12s.012-3.584.07-4.85c.054-1.17.24-1.97.403-2.43A4.92 4.92 0 0 1 3.72 2.948 4.902 4.902 0 0 1 5.492 1.795c.46-.163 1.26-.35 2.43-.403C9.188 1.334 9.568 1.322 12.77 1.322l-.77.841zm0 1.838c-3.163 0-3.53.011-4.78.069-1.087.05-1.68.23-2.074.383a3.07 3.07 0 0 0-1.14.74 3.07 3.07 0 0 0-.74 1.14c-.153.394-.333.987-.383 2.074C2.655 9.3 2.644 9.67 2.644 12s.011 2.7.069 3.78c.05 1.087.23 1.68.383 2.074.18.46.433.876.74 1.14.264.307.68.56 1.14.74.394.153.987.333 2.074.383C9.3 20.167 9.67 20.178 12 20.178s2.7-.011 3.78-.069c1.087-.05 1.68-.23 2.074-.383.46-.18.876-.433 1.14-.74.307-.264.56-.68.74-1.14.153-.394.333-.987.383-2.074.058-1.08.069-1.45.069-3.78s-.011-2.7-.069-3.78c-.05-1.087-.23-1.68-.383-2.074a3.07 3.07 0 0 0-.74-1.14 3.07 3.07 0 0 0-1.14-.74c-.394-.153-.987-.333-2.074-.383C14.7 4.012 14.33 4 12 4zm0 3.135a4.865 4.865 0 1 1 0 9.73 4.865 4.865 0 0 1 0-9.73zm0 1.838a3.027 3.027 0 1 0 0 6.054 3.027 3.027 0 0 0 0-6.054zm6.406-1.99a1.134 1.134 0 1 1-2.268 0 1.134 1.134 0 0 1 2.268 0z"/>
        </svg>
      </div>
      <span class="menu-btn-title">Instagram Kami</span>
      <span class="menu-btn-sub">Kunjungi</span>
    </a>

    <!-- TikTok -->
    <a class="menu-btn"
       href="LINK_TIKTOK_DISINI"
       target="_blank"
       rel="noopener">
      <div class="menu-icon tt">
        <svg width="22" height="22" fill="white" viewBox="0 0 24 24">
          <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.74a4.85 4.85 0 0 1-1.01-.05z"/>
        </svg>
      </div>
      <span class="menu-btn-title">TikTok Kami</span>
      <span class="menu-btn-sub">Kunjungi</span>
    </a>

    <!-- Anggota Kelas -->
    <button class="menu-btn" onclick="goAnggota()">
      <div class="menu-icon angg">
        <svg width="22" height="22" fill="white" viewBox="0 0 24 24">
          <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
        </svg>
      </div>
      <span class="menu-btn-title">Anggota Kelas</span>
      <span class="menu-btn-sub">Lihat</span>
    </button>

    <!-- Mini Game -->
    <button class="menu-btn" onclick="goGame()">
      <div class="menu-icon game">
        <svg width="22" height="22" fill="white" viewBox="0 0 24 24">
          <path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5S14.67 12 15.5 12s1.5.67 1.5 1.5S16.33 15 15.5 15zm3-3c-.83 0-1.5-.67-1.5-1.5S17.67 9 18.5 9 20 9.67 20 10.5 19.33 12 18.5 12z"/>
        </svg>
      </div>
      <span class="menu-btn-title">Mini Game</span>
      <span class="menu-btn-sub">Main</span>
    </button>

  </div>
  <!-- /menu-grid -->

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <div class="bottom-btns">
      <button class="bottom-btn" onclick="openModal('modal-gallery')">
        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
          <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
        </svg>
        Gallery
      </button>
      <button class="bottom-btn" onclick="openModal('modal-jadwal')">
        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
          <path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/>
        </svg>
        Jadwal
      </button>
    </div>
  </div>

</div>
<!-- /home -->


<!-- ═══════════════════════════════════════════════════════════
     ANGGOTA PAGE
═════════════════════════════════════════════════════════════ -->
<div id="page-anggota" class="inner-page">

  <div class="page-topbar">
    <button class="back-btn" onclick="goHome()">←</button>
    <span class="page-topbar-title">👥 Anggota Kelas</span>
  </div>

  <div id="anggota-grid" class="anggota-grid"></div>

</div>


<!-- ═══════════════════════════════════════════════════════════
     GAME PAGE
═════════════════════════════════════════════════════════════ -->
<div id="page-game" class="inner-page">

  <div class="page-topbar">
    <button id="game-back-btn" class="back-btn" onclick="goHome()">←</button>
    <span class="page-topbar-title">🎮 Mini Game Kuis</span>
  </div>

  <div class="game-container">

    <!-- Subject Select -->
    <div id="subject-select" class="game-subject-select">
      <h3>Pilih Mata Pelajaran</h3>
      <div class="subject-grid">
        <button class="subject-btn ipa" onclick="selectSubject('IPA')">
          <span class="s-icon">🔬</span>IPA
        </button>
        <button class="subject-btn pai" onclick="selectSubject('PAI')">
          <span class="s-icon">📖</span>PAI
        </button>
        <button class="subject-btn mtk" onclick="selectSubject('MTK')">
          <span class="s-icon">📐</span>Matematika
        </button>
        <button class="subject-btn tik" onclick="selectSubject('TIK')">
          <span class="s-icon">💻</span>TIK
        </button>
      </div>
    </div>

    <!-- Quiz Area -->
    <div id="quiz-area" class="game-quiz">
      <div class="quiz-header">
        <div class="quiz-score-badge">
          ⭐ <span id="quiz-score-now">0</span>
        </div>
        <div class="quiz-progress-wrap">
          <div class="quiz-progress-label">
            <span id="quiz-subject-name">—</span>
            <span><span id="quiz-progress-cur">0</span>/<span id="quiz-progress-tot">10</span></span>
          </div>
          <div class="quiz-progress-bar">
            <div class="quiz-progress-fill" id="quiz-progress-fill" style="width:0%"></div>
          </div>
        </div>
      </div>
      <div id="question-area"></div>
    </div>

    <!-- Result -->
    <div id="quiz-result" class="result-screen"></div>

  </div>
</div>


<!-- ═══════════════════════════════════════════════════════════
     MODAL: GALLERY
═════════════════════════════════════════════════════════════ -->
<div id="modal-gallery" class="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">📸 Gallery Kenangan</span>
      <button class="modal-close" onclick="closeModal('modal-gallery')">✕</button>
    </div>
    <div class="modal-body">
      <div id="gallery-list" class="gallery-list"></div>
    </div>
  </div>
</div>


<!-- ═══════════════════════════════════════════════════════════
     MODAL: JADWAL
═════════════════════════════════════════════════════════════ -->
<div id="modal-jadwal" class="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">📅 Jadwal Pelajaran</span>
      <button class="modal-close" onclick="closeModal('modal-jadwal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="jadwal-tabs">
        <button class="jadwal-tab" data-day="Senin"   onclick="switchDay('Senin')">Senin</button>
        <button class="jadwal-tab" data-day="Selasa"  onclick="switchDay('Selasa')">Selasa</button>
        <button class="jadwal-tab" data-day="Rabu"    onclick="switchDay('Rabu')">Rabu</button>
        <button class="jadwal-tab" data-day="Kamis"   onclick="switchDay('Kamis')">Kamis</button>
        <button class="jadwal-tab" data-day="Jumat"   onclick="switchDay('Jumat')">Jumat</button>
        <button class="jadwal-tab" data-day="Sabtu"   onclick="switchDay('Sabtu')">Sabtu</button>
      </div>
      <div id="jadwal-list" class="jadwal-list"></div>
    </div>
  </div>
</div>


<!-- Scripts — urutan penting! -->
<script src="anggota.js"></script>
<script src="galery.js"></script>
<script src="script.js"></script>

</body>
</html>
